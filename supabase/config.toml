project_id = "Interfone_Digital"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
enable_signup = true

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[functions.call-timeout-processor]
enabled = true
verify_jwt = false
entrypoint = "./functions/call-timeout-processor/index.ts"

