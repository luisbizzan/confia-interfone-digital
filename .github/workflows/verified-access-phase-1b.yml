name: Verified Access Phase 1B

on:
  push:
    branches:
      - agent/verified-access-phase-1b
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "supabase/rollback/**"
      - ".github/workflows/verified-access-phase-1b.yml"
      - "docs/verified-access-phase-1b*"
      - "docs/adr/20260716-verified-access-network-foundation.md"
      - "docs/product/verified-access/**"
  workflow_dispatch:

concurrency:
  group: verified-access-phase-1b-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start Supabase local stack
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/verified-access-1b-supabase-start.log
          : > /tmp/verified-access-1b-supabase-start-sanitized.log
          start_ok=0

          sanitize_supabase_start_log() {
            if [ ! -f /tmp/verified-access-1b-supabase-start.log ]; then
              return 0
            fi

            sed -E \
              -e '/(Publishable key|Secret key|Access key|Storage secret|JWT secret|anon key|service_role key|S3 Access Key|S3 Secret Key|API URL|DB URL|GraphQL URL|Studio URL|Inbucket URL|JWT_SECRET|POSTGRES_PASSWORD|connection string)/Id' \
              -e 's#postgres(ql)?://[^[:space:]]+#postgres://[redacted]#g' \
              -e 's#eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+#[redacted-jwt]#g' \
              /tmp/verified-access-1b-supabase-start.log > /tmp/verified-access-1b-supabase-start-sanitized.log
          }

          for attempt in 1 2 3; do
            echo "Supabase start attempt ${attempt}/3" | tee -a /tmp/verified-access-1b-supabase-start.log
            npx supabase stop --no-backup >> /tmp/verified-access-1b-supabase-start.log 2>&1 || true

            if npx supabase start >> /tmp/verified-access-1b-supabase-start.log 2>&1; then
              npx supabase status >> /tmp/verified-access-1b-supabase-start.log 2>&1 || true
              start_ok=1
              break
            fi

            npx supabase status >> /tmp/verified-access-1b-supabase-start.log 2>&1 || true
            docker ps -a >> /tmp/verified-access-1b-supabase-start.log 2>&1 || true
            sleep $((attempt * 20))
          done

          sanitize_supabase_start_log
          rm -f /tmp/verified-access-1b-supabase-start.log

          if [ "$start_ok" -eq 1 ]; then
            exit 0
          fi

          {
            echo '::group::Supabase start failure sanitized tail'
            tail -120 /tmp/verified-access-1b-supabase-start-sanitized.log
            echo '::endgroup::'
          }
          message=$(tail -20 /tmp/verified-access-1b-supabase-start-sanitized.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
          echo "::error file=.github/workflows/verified-access-phase-1b.yml::Supabase local stack failed after 3 attempts. ${message}"
          exit 1

      - name: Apply migrations from scratch
        run: npx supabase db reset

      - name: Run pgTAP database tests
        shell: bash
        run: |
          set +e
          set -o pipefail
          npx supabase test db 2>&1 | tee /tmp/verified-access-1b-pgtap.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo '::group::pgTAP failure tail'
              tail -80 /tmp/verified-access-1b-pgtap.log
              echo '::endgroup::'
            }
            message=$(tail -20 /tmp/verified-access-1b-pgtap.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1b.sql::${message}"
            exit "$status"
          fi

      - name: Run integration SQL scenarios
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          set -o pipefail
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1a_integration.psql 2>&1 | tee /tmp/verified-access-1b-integration.log
          status_a=${PIPESTATUS[0]}
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1b_integration.psql 2>&1 | tee -a /tmp/verified-access-1b-integration.log
          status_b=${PIPESTATUS[0]}
          if [ "$status_a" -ne 0 ] || [ "$status_b" -ne 0 ]; then
            {
              echo '::group::Integration failure tail'
              tail -60 /tmp/verified-access-1b-integration.log
              echo '::endgroup::'
            }
            message=$(tail -16 /tmp/verified-access-1b-integration.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1b_integration.psql::${message}"
            exit 1
          fi

      - name: Run runtime role permission checks
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/verified-access-1b-role-runtime.log

          expect_permission_denied() {
            local label="$1"
            local sql="$2"
            local output
            local status

            set +e
            output=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "$sql" 2>&1)
            status=$?
            set -e

            {
              echo "[$label]"
              echo "$output"
              echo
            } >> /tmp/verified-access-1b-role-runtime.log

            if [ "$status" -eq 0 ] || ! grep -qi "permission denied" <<< "$output"; then
              message=$(echo "$output" | tail -8 | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
              echo "::error file=supabase/tests/verified_access_phase_1b_integration.psql::${label} did not fail with permission denied. ${message}"
              exit 1
            fi
          }

          for role_name in anon authenticated service_role; do
            expect_permission_denied "${role_name} cannot read network subjects" "set role ${role_name}; select count(*) from public.verified_access_network_subjects;"
            expect_permission_denied "${role_name} cannot insert network subjects" "set role ${role_name}; insert into public.verified_access_network_subjects (identity_assurance_level, first_verified_at, last_verified_at) values ('IDENTITY_VERIFIED', now(), now());"
            expect_permission_denied "${role_name} cannot update network subjects" "set role ${role_name}; update public.verified_access_network_subjects set status = 'RETIRED' where false;"
            expect_permission_denied "${role_name} cannot delete network subjects" "set role ${role_name}; delete from public.verified_access_network_subjects where false;"
          done

      - name: Run Supabase database lint
        run: npx supabase db lint

      - name: Create rollback sentinel
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          insert into public.condominiums (id, name, document)
          values ('aaaaaaaa-1b1b-4000-8000-000000000001', 'Verified Access Phase 1B CI Sentinel', 'CI-1B')
          on conflict (id) do nothing;

          insert into public.condominium_features (condominium_id, feature_key, enabled)
          values
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'INTERCOM', true),
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'VERIFIED_ACCESS', false),
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'VERIFIED_ACCESS_BACKGROUND_CHECK', false),
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'VERIFIED_ACCESS_NETWORK_IDENTITY', false),
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'VERIFIED_ACCESS_NETWORK_SIGNALS', false),
            ('aaaaaaaa-1b1b-4000-8000-000000000001', 'VERIFIED_ACCESS_NETWORK_HOLD', false)
          on conflict (condominium_id, feature_key) do update
            set enabled = excluded.enabled;
          SQL

      - name: Roll back Phase 1B objects
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/rollback/20260716100000_verified_access_phase_1b_rollback.sql

      - name: Verify rollback scope
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          declare
            v_sentinel_condominium_id uuid := 'aaaaaaaa-1b1b-4000-8000-000000000001';
          begin
            if exists (
              select 1
              from pg_class c
              join pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public'
                and c.relname like 'verified_access_network_%'
            ) then
              raise exception 'rollback left Phase 1B network objects behind';
            end if;

            if to_regclass('public.verified_access_requests') is null then
              raise exception 'rollback removed Phase 1A requests';
            end if;

            if to_regclass('public.verified_access_identity_profiles') is null then
              raise exception 'rollback removed Phase 1A identity profiles';
            end if;

            if to_regclass('public.persons') is null then
              raise exception 'rollback removed public.persons';
            end if;

            if not exists (
              select 1
              from public.condominium_features
              where condominium_id = v_sentinel_condominium_id
                and feature_key = 'INTERCOM'
                and enabled is true
            ) then
              raise exception 'rollback removed INTERCOM feature sentinel';
            end if;

            if not exists (
              select 1
              from public.condominium_features
              where condominium_id = v_sentinel_condominium_id
                and feature_key in ('VERIFIED_ACCESS', 'VERIFIED_ACCESS_BACKGROUND_CHECK')
                and enabled is false
            ) then
              raise exception 'rollback removed Phase 1A feature sentinel';
            end if;

            if exists (
              select 1
              from public.condominium_features
              where condominium_id = v_sentinel_condominium_id
                and feature_key in (
                  'VERIFIED_ACCESS_NETWORK_IDENTITY',
                  'VERIFIED_ACCESS_NETWORK_SIGNALS',
                  'VERIFIED_ACCESS_NETWORK_HOLD'
                )
            ) then
              raise exception 'rollback left Phase 1B network feature sentinels';
            end if;
          end $$;
          SQL

      - name: Reapply migrations
        run: npx supabase db reset

      - name: Re-run pgTAP smoke tests after reapply
        shell: bash
        run: |
          set +e
          set -o pipefail
          npx supabase test db 2>&1 | tee /tmp/verified-access-1b-reapply-pgtap.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo '::group::Reapply pgTAP failure tail'
              tail -80 /tmp/verified-access-1b-reapply-pgtap.log
              echo '::endgroup::'
            }
            message=$(tail -20 /tmp/verified-access-1b-reapply-pgtap.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1b.sql::${message}"
            exit "$status"
          fi

      - name: Re-run integration smoke after reapply
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          set -o pipefail
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1a_integration.psql 2>&1 | tee /tmp/verified-access-1b-reapply-integration.log
          status_a=${PIPESTATUS[0]}
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1b_integration.psql 2>&1 | tee -a /tmp/verified-access-1b-reapply-integration.log
          status_b=${PIPESTATUS[0]}
          if [ "$status_a" -ne 0 ] || [ "$status_b" -ne 0 ]; then
            {
              echo '::group::Reapply integration failure tail'
              tail -60 /tmp/verified-access-1b-reapply-integration.log
              echo '::endgroup::'
            }
            message=$(tail -16 /tmp/verified-access-1b-reapply-integration.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1b_integration.psql::${message}"
            exit 1
          fi

      - name: Stop Supabase local stack
        if: always()
        run: npx supabase stop --no-backup || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verified-access-phase-1b-database-diagnostics
          path: |
            /tmp/verified-access-1b-integration.log
            /tmp/verified-access-1b-role-runtime.log
            /tmp/verified-access-1b-pgtap.log
            /tmp/verified-access-1b-reapply-pgtap.log
            /tmp/verified-access-1b-reapply-integration.log
            /tmp/verified-access-1b-supabase-start-sanitized.log
          if-no-files-found: ignore

  admin-web:
    name: admin-web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint admin web
        run: npm run admin:lint

      - name: Build admin web
        run: npm run admin:build
