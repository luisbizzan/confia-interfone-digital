name: Verified Access Phase 3C

on:
  push:
    branches: [agent/verified-access-phase-3c]
  pull_request:
    paths:
      - "supabase/**"
      - "apps/admin-web/**"
      - "apps/verified-access-public/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/verified-access-phase-*.yml"
      - ".github/workflows/verified-access-maintenance.yml"
      - "docs/product/verified-access/**"
      - "docs/verified-access-phase-3c-validation.md"
  workflow_dispatch:

concurrency:
  group: verified-access-phase-3c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Start Supabase local stack
        shell: bash
        run: |
          set -euo pipefail
          raw=/tmp/verified-access-phase-3c-start-raw.log
          safe=/tmp/verified-access-phase-3c-start-sanitized.log
          : > "$raw"
          : > "$safe"
          started=0
          for attempt in 1 2 3; do
            npx supabase stop --no-backup >> "$raw" 2>&1 || true
            if npx supabase start >> "$raw" 2>&1; then started=1; break; fi
            sleep $((attempt * 20))
          done
          sed -E \
            -e '/(Publishable key|Secret key|Access key|Storage secret|JWT secret|anon key|service_role key|API URL|DB URL|JWT_SECRET|POSTGRES_PASSWORD)/Id' \
            -e 's#postgres(ql)?://[^[:space:]]+#postgres://[redacted]#g' \
            -e 's#eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+#[redacted-jwt]#g' \
            "$raw" > "$safe"
          rm -f "$raw"
          test "$started" -eq 1 || { tail -100 "$safe"; exit 1; }
      - name: Apply migrations
        run: npx supabase db reset
      - name: Run pgTAP for all phases
        run: npx supabase test db
      - name: Run integration SQL for Phases 1A through 3C
        env: { PGPASSWORD: postgres }
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            supabase/tests/verified_access_phase_1a_integration.psql \
            supabase/tests/verified_access_phase_1b_integration.psql \
            supabase/tests/verified_access_phase_1c_integration.psql \
            supabase/tests/verified_access_phase_2_integration.psql \
            supabase/tests/verified_access_phase_3a_integration.psql \
            supabase/tests/verified_access_phase_3b_integration.psql \
            supabase/tests/verified_access_phase_3c_integration.psql
          do
            psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$file"
          done
      - name: Run Phase 3C runtime role checks
        env: { PGPASSWORD: postgres }
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_3c_runtime_roles.psql
      - name: Database lint
        run: npx supabase db lint
      - name: Roll back Phase 3C
        env: { PGPASSWORD: postgres }
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/rollback/verified_access_phase_3c_rollback.sql
      - name: Verify rollback and Phase 1A-3B preservation
        env: { PGPASSWORD: postgres }
        shell: bash
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          do $$ begin
            if to_regclass('public.verified_access_maintenance_findings') is not null then
              raise exception 'Phase 3C table survived rollback';
            end if;
            if exists(select 1 from pg_roles where rolname='verified_access_phase3c_maintenance_executor') then
              raise exception 'Phase 3C role survived rollback';
            end if;
            if to_regclass('public.verified_access_public_sessions') is null
               or to_regclass('public.verified_access_invitations') is null
               or to_regclass('public.verified_access_request_commands') is null
               or to_regclass('public.verified_access_network_subjects') is null
               or to_regclass('public.persons') is null then
              raise exception 'earlier phase object was removed';
            end if;
            if exists(select 1 from public.condominium_features where feature_key='VERIFIED_ACCESS' and enabled) then
              raise exception 'feature became enabled';
            end if;
          end $$;
          SQL
      - name: Reapply migrations and pgTAP
        run: npx supabase db reset && npx supabase test db
      - name: Post-reapplication integrations and runtime checks
        env: { PGPASSWORD: postgres }
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            supabase/tests/verified_access_phase_1a_integration.psql \
            supabase/tests/verified_access_phase_1b_integration.psql \
            supabase/tests/verified_access_phase_1c_integration.psql \
            supabase/tests/verified_access_phase_2_integration.psql \
            supabase/tests/verified_access_phase_3a_integration.psql \
            supabase/tests/verified_access_phase_3b_integration.psql \
            supabase/tests/verified_access_phase_3c_integration.psql
          do
            psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$file"
          done
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_3c_runtime_roles.psql
      - if: always()
        run: npx supabase stop --no-backup || true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verified-access-phase-3c-sanitized-diagnostics
          path: /tmp/verified-access-phase-3c-start-sanitized.log
          if-no-files-found: ignore

  edge-function:
    name: edge-function
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno fmt --check supabase/functions/verified-access-maintenance-run
      - run: deno lint supabase/functions/verified-access-maintenance-run
      - run: deno check supabase/functions/verified-access-maintenance-run/index.ts
      - run: deno test supabase/functions/verified-access-maintenance-run
      - name: Reject logging and browser-facing CORS
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RInE 'console\.(log|debug|info|warn|error)' supabase/functions/verified-access-maintenance-run
          ! grep -RInE 'Access-Control-Allow-Origin|OPTIONS' supabase/functions/verified-access-maintenance-run

  workflow-policy:
    name: workflow-policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify scheduler remains manual and serialized
        shell: bash
        run: |
          set -euo pipefail
          file=.github/workflows/verified-access-maintenance.yml
          grep -q 'workflow_dispatch:' "$file"
          ! grep -qE '^[[:space:]]+schedule:' "$file"
          grep -q 'cancel-in-progress: false' "$file"
          grep -q 'VERIFIED_ACCESS_MAINTENANCE_SECRET' "$file"

  public-web:
    name: public-web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: npm run lint --workspace verified-access-public
      - run: npm run typecheck --workspace verified-access-public
      - run: npm run test --workspace verified-access-public
      - run: npm run build --workspace verified-access-public

  admin-web:
    name: admin-web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: npm run admin:lint
      - run: npm run admin:build
