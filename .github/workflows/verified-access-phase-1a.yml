name: Verified Access Phase 1A

on:
  push:
    branches:
      - agent/verified-access-phase-1a-r
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "supabase/rollback/**"
      - ".github/workflows/verified-access-phase-1a.yml"
      - "docs/verified-access-phase-1a*"
      - "docs/adr/20260714-verified-access-local-foundation.md"
  workflow_dispatch:

concurrency:
  group: verified-access-phase-1a-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start Supabase local stack
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/verified-access-supabase-start.log

          for attempt in 1 2 3; do
            echo "Supabase start attempt ${attempt}/3" | tee -a /tmp/verified-access-supabase-start.log
            npx supabase stop --no-backup >> /tmp/verified-access-supabase-start.log 2>&1 || true

            if npx supabase start >> /tmp/verified-access-supabase-start.log 2>&1; then
              npx supabase status >> /tmp/verified-access-supabase-start.log 2>&1 || true
              exit 0
            fi

            npx supabase status >> /tmp/verified-access-supabase-start.log 2>&1 || true
            docker ps -a >> /tmp/verified-access-supabase-start.log 2>&1 || true
            sleep $((attempt * 20))
          done

          {
            echo '::group::Supabase start failure tail'
            tail -120 /tmp/verified-access-supabase-start.log
            echo '::endgroup::'
          }
          message=$(tail -20 /tmp/verified-access-supabase-start.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
          echo "::error file=.github/workflows/verified-access-phase-1a.yml::Supabase local stack failed after 3 attempts. ${message}"
          exit 1

      - name: Apply migrations from scratch
        run: npx supabase db reset

      - name: Run pgTAP database tests
        run: npx supabase test db

      - name: Run integration SQL scenarios
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          set -o pipefail
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1a_integration.psql 2>&1 | tee /tmp/verified-access-integration.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo '::group::Integration failure tail'
              tail -40 /tmp/verified-access-integration.log
              echo '::endgroup::'
            }
            message=$(tail -12 /tmp/verified-access-integration.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1a_integration.psql::${message}"
            exit "$status"
          fi

      - name: Run runtime role permission checks
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/verified-access-role-runtime.log

          expect_permission_denied() {
            local label="$1"
            local sql="$2"
            local output
            local status

            set +e
            output=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "$sql" 2>&1)
            status=$?
            set -e

            {
              echo "[$label]"
              echo "$output"
              echo
            } >> /tmp/verified-access-role-runtime.log

            if [ "$status" -eq 0 ] || ! grep -qi "permission denied" <<< "$output"; then
              message=$(echo "$output" | tail -8 | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
              echo "::error file=supabase/tests/verified_access_phase_1a_integration.psql::${label} did not fail with permission denied. ${message}"
              exit 1
            fi
          }

          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL' 2>&1 | tee -a /tmp/verified-access-role-runtime.log
          set role service_role;
          select count(*) from public.verified_access_requests;
          insert into public.verified_access_audit_events (
            condominium_id,
            aggregate_type,
            aggregate_id,
            event_type,
            metadata
          )
          values (
            '11111111-aaaa-4000-8000-000000000001',
            'REQUEST',
            '55555555-aaaa-4000-8000-000000000001',
            'SERVICE_ROLE_TEST',
            '{"event":"service_role_insert"}'::jsonb
          );
          reset role;
          SQL

          expect_permission_denied "anon cannot read requests" "set role anon; select count(*) from public.verified_access_requests;"
          expect_permission_denied "anon cannot insert audit" "set role anon; insert into public.verified_access_audit_events (condominium_id, aggregate_type, aggregate_id, event_type) values ('11111111-aaaa-4000-8000-000000000001', 'REQUEST', '55555555-aaaa-4000-8000-000000000001', 'REQUEST_CREATED');"
          expect_permission_denied "authenticated cannot read identity profiles" "set role authenticated; select count(*) from public.verified_access_identity_profiles;"
          expect_permission_denied "authenticated cannot insert audit" "set role authenticated; insert into public.verified_access_audit_events (condominium_id, aggregate_type, aggregate_id, event_type) values ('11111111-aaaa-4000-8000-000000000001', 'REQUEST', '55555555-aaaa-4000-8000-000000000001', 'REQUEST_CREATED');"
          expect_permission_denied "service_role cannot delete requests" "set role service_role; delete from public.verified_access_requests where id = '55555555-aaaa-4000-8000-000000000001';"
          expect_permission_denied "service_role cannot update audit" "set role service_role; update public.verified_access_audit_events set metadata = '{\"event\":\"service_role_update\"}'::jsonb where id = '99999999-aaaa-4000-8000-000000000001';"
          expect_permission_denied "service_role cannot truncate audit" "set role service_role; truncate public.verified_access_audit_events;"

      - name: Run Supabase database lint
        run: npx supabase db lint

      - name: Create rollback sentinel
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          insert into public.condominiums (id, name, document)
          values ('aaaaaaaa-1a1a-4a1a-8a1a-000000000001', 'Verified Access CI Sentinel', 'CI-INTERCOM')
          on conflict (id) do nothing;

          insert into public.condominium_features (condominium_id, feature_key, enabled)
          values
            ('aaaaaaaa-1a1a-4a1a-8a1a-000000000001', 'INTERCOM', true),
            ('aaaaaaaa-1a1a-4a1a-8a1a-000000000001', 'VERIFIED_ACCESS', false),
            ('aaaaaaaa-1a1a-4a1a-8a1a-000000000001', 'VERIFIED_ACCESS_BACKGROUND_CHECK', false)
          on conflict (condominium_id, feature_key) do update
            set enabled = excluded.enabled;
          SQL

      - name: Roll back Phase 1A objects
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/rollback/20260714100000_verified_access_phase_1a_rollback.sql

      - name: Verify rollback scope
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          declare
            v_sentinel_condominium_id uuid := 'aaaaaaaa-1a1a-4a1a-8a1a-000000000001';
          begin
            if exists (
              select 1
              from pg_class c
              join pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public'
                and c.relname like 'verified_access_%'
            ) then
              raise exception 'rollback left verified_access objects behind';
            end if;

            if to_regclass('public.persons') is null then
              raise exception 'rollback removed public.persons';
            end if;

            if to_regclass('public.condominium_features') is null then
              raise exception 'rollback removed public.condominium_features';
            end if;

            if to_regprocedure('public.condominium_feature_enabled(uuid,text)') is null then
              raise exception 'rollback removed public.condominium_feature_enabled(uuid,text)';
            end if;

            if not exists (
              select 1
              from public.condominium_features
              where condominium_id = v_sentinel_condominium_id
                and feature_key = 'INTERCOM'
                and enabled is true
            ) then
              raise exception 'rollback removed INTERCOM feature sentinel';
            end if;

            if exists (
              select 1
              from public.condominium_features
              where condominium_id = v_sentinel_condominium_id
                and feature_key in ('VERIFIED_ACCESS', 'VERIFIED_ACCESS_BACKGROUND_CHECK')
            ) then
              raise exception 'rollback left Phase 1A feature flags for sentinel';
            end if;

            if to_regclass('public.ux_units_id_condominium_id') is not null then
              raise exception 'rollback left ux_units_id_condominium_id behind';
            end if;

            if to_regclass('public.ux_user_profiles_id_condominium_id') is not null then
              raise exception 'rollback left ux_user_profiles_id_condominium_id behind';
            end if;
          end $$;
          SQL

      - name: Reapply migrations
        run: npx supabase db reset

      - name: Re-run pgTAP smoke tests after reapply
        run: npx supabase test db

      - name: Re-run integration smoke after reapply
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          set -o pipefail
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_access_phase_1a_integration.psql 2>&1 | tee /tmp/verified-access-reapply-integration.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo '::group::Reapply integration failure tail'
              tail -40 /tmp/verified-access-reapply-integration.log
              echo '::endgroup::'
            }
            message=$(tail -12 /tmp/verified-access-reapply-integration.log | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/' | tr -d '\n')
            echo "::error file=supabase/tests/verified_access_phase_1a_integration.psql::${message}"
            exit "$status"
          fi

      - name: Stop Supabase local stack
        if: always()
        run: npx supabase stop --no-backup || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verified-access-phase-1a-database-diagnostics
          path: /tmp/verified-access-*.log
          if-no-files-found: ignore

  admin-web:
    name: admin-web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint admin web
        run: npm run admin:lint

      - name: Build admin web
        run: npm run admin:build
